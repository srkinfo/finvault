version: '3.9'

services:
  finvault-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finvault-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:finvaultdb
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      FINVAULT_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      FINVAULT_JWT_SECRET: FinVaultSuperSecretKey2024ChangeInProductionMustBe256BitsLong
    restart: unless-stopped