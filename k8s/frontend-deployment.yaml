apiVersion: apps/v1
kind: Deployment
metadata:
  name: finvault-frontend
  namespace: finvault
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: finvault/frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

          env:
            - name: REACT_APP_API_URL
              value: "http://finvault-backend-service/api"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"