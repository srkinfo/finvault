apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finvault-backend-hpa
  namespace: finvault
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finvault-backend
  minReplicas: 3
  maxReplicas: 10 
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finvault-frontend-hpa
  namespace: finvault
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finvault-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
