services:

  postgres:
    image: postgres:15-alpine
    container_name: finvault-db
    environment:
      POSTGRES_DB: finvaultdb
      POSTGRES_USER: finvault
      POSTGRES_PASSWORD: finvault123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finvault -d finvaultdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finvault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finvaultdb
      SPRING_DATASOURCE_USERNAME: finvault
      SPRING_DATASOURCE_PASSWORD: finvault123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      FINVAULT_JWT_SECRET: FinVaultSuperSecretKey2024ChangeInProduction
      FINVAULT_JWT_EXPIRATION: 86400000
      FINVAULT_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finvault-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: