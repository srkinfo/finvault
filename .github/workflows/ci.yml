name: FinVault CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── JOB 1: Test Backend ───
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: |
          cd backend
          mvn test --no-transfer-progress

      - name: Build backend jar
        run: |
          cd backend
          mvn clean package -DskipTests --no-transfer-progress

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─── JOB 2: Test Frontend ───
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ─── JOB 3: Build Docker Images ───
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/finvault-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/finvault-backend:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/finvault-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/finvault-frontend:${{ github.sha }}

  # ─── JOB 4: Summary ───
  summary:
    name: ✅ Pipeline Summary
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Success Summary
        run: |
          echo "================================"
          echo "✅ FinVault CI Pipeline Complete!"
          echo "================================"
          echo "Backend tests  → PASSED"
          echo "Frontend build → PASSED"
          echo "Docker images  → PUSHED"
          echo "Commit: ${{ github.sha }}"
          echo "================================"
